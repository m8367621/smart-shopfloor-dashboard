<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>History | Smart Shopfloor Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>

<body>

<div class="main-content">

<h1>📜 Sensor History & Reports</h1>

<p class="page-subtitle">
View, search, analyze and download previous sensor readings.
</p>

<!-- ================= FILTER SECTION ================= -->

<div class="history-filter">
<div class="filter-box">

<label>Date Range</label>

<select id="dateRange">

<option value="">Custom Range</option>
<option value="today">Today</option>
<option value="yesterday">Yesterday</option>
<option value="7days">Last 7 Days</option>
<option value="30days">Last 30 Days</option>

</select>

</div>

<div class="filter-box">
<label>From Date</label>
<input type="date" id="fromDate">
</div>

<div class="filter-box">
<label>To Date</label>
<input type="date" id="toDate">
</div>

<div class="filter-box">
    <label>Search</label>

    <div class="search-box">

        <span class="search-icon">🔍</span>

        <input
            type="text"
            id="searchInput"
            placeholder="Search sensor value...">

    </div>

</div>
<button class="primary-btn">
🔍 Search
</button>

<button class="success-btn">
📄 Download PDF
</button>

<button class="excel-btn">
📊 Download Excel
</button>

</div>

<!-- ================= REPORT SUMMARY ================= -->

<h2 class="section-title">
📊 Report Summary
</h2>

<div class="summary-grid">

<div class="summary-card">

<h3>Total Records</h3>

<h1 id="totalRecords">
245
</h1>

</div>

<div class="summary-card safe">

<h3>Safe</h3>

<h1 id="safeCount">
210
</h1>

</div>

<div class="summary-card warning">

<h3>Warning</h3>

<h1 id="warningCount">
25
</h1>

</div>

<div class="summary-card danger">

<h3>Danger</h3>

<h1 id="dangerCount">
10
</h1>

</div>

</div>

<!-- Part 2 starts below -->
<!-- ================= SENSOR STATISTICS ================= -->


<!-- ================= HISTORY TABLE ================= -->

<h2 class="section-title">
📋 Sensor Reading History
</h2>

<div class="table-container">

<table id="historyTable">

<thead>

<tr>

<th>Date</th>
<th>Time</th>
<th>PM1.0</th>
<th>PM2.5</th>
<th>PM10</th>
<th>Noise</th>
<th>Temperature</th>
<th>Humidity</th>
<th>Light</th>

</tr>

</thead>

<tbody>


</tbody>

</table>

</div>

</div>

<script>

// =============================
// Search Function
// =============================

document.getElementById("searchInput").addEventListener("keyup", function(){

let filter=this.value.toUpperCase();

let table=document.getElementById("historyTable");

let tr=table.getElementsByTagName("tr");

for(let i=1;i<tr.length;i++)
{

let rowText=tr[i].innerText.toUpperCase();

if(rowText.indexOf(filter)>-1)
tr[i].style.display="";

else
tr[i].style.display="none";

}

});


// =============================
// PDF Download 
// =============================
document.querySelector(".success-btn").onclick = function () {

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(18);
    doc.text("Smart Shopfloor Environment Monitoring System", 15, 20);

    doc.setFontSize(13);
    doc.text("Sensor History Report", 15, 32);

    doc.setFontSize(10);
    doc.text("Generated: " + new Date().toLocaleString(), 15, 42);

    doc.text("Total Records : " + document.getElementById("totalRecords").innerText, 15, 55);
    doc.text("Safe : " + document.getElementById("safeCount").innerText, 15, 62);
    doc.text("Warning : " + document.getElementById("warningCount").innerText, 15, 69);
    doc.text("Danger : " + document.getElementById("dangerCount").innerText, 15, 76);

    doc.autoTable({
        html: "#historyTable",
        startY: 85,
        theme: "grid",
        styles: {
            fontSize: 8
        },
        headStyles: {
            fillColor: [41, 128, 185]
        }
    });

    doc.save("Smart_Shopfloor_Report.pdf");
}

// =============================
// Excel Download 
// =============================
document.querySelector(".excel-btn").onclick = function () {

    let wb = XLSX.utils.book_new();

    let data = [];

    data.push([
        "Date",
        "Time",
        "PM1.0",
        "PM2.5",
        "PM10",
        "Noise",
        "Temperature",
        "Humidity",
        "Light",
        "Status"
    ]);

    let rows = document.querySelectorAll("#historyTable tbody tr");

    rows.forEach(row => {

    // Skip hidden rows after filtering
    if (row.style.display === "none") return;

    let rowData = [];

    row.querySelectorAll("td").forEach(cell => {
        rowData.push(cell.innerText);
    });

    data.push(rowData);

    });

    let ws = XLSX.utils.aoa_to_sheet(data);

    XLSX.utils.book_append_sheet(wb, ws, "Sensor History");

    XLSX.writeFile(wb, "Smart_Shopfloor_History_Report.xlsx");

};
// =============================
// DATE RANGE DROPDOWN
// =============================

document.getElementById("dateRange").addEventListener("change", function () {

    const value = this.value;

    const today = new Date();

    let from = new Date();

    let to = new Date();

    if (value === "today") {

        // today

    }

    else if (value === "yesterday") {

        from.setDate(today.getDate() - 1);
        to.setDate(today.getDate() - 1);

    }

    else if (value === "7days") {

        from.setDate(today.getDate() - 6);

    }

    else if (value === "30days") {

        from.setDate(today.getDate() - 29);

    }

    else {

        document.getElementById("fromDate").value = "";
        document.getElementById("toDate").value = "";
        return;

    }

    document.getElementById("fromDate").value =
        from.toISOString().split("T")[0];

    document.getElementById("toDate").value =
        to.toISOString().split("T")[0];

});


// =============================
// Search Button
// =============================

document.querySelector(".primary-btn").onclick = function () {

    let fromDate = document.getElementById("fromDate").value;
    let toDate = document.getElementById("toDate").value;
    let search = document.getElementById("searchInput").value.toUpperCase();

    let table = document.getElementById("historyTable");
    let rows = table.getElementsByTagName("tbody")[0].getElementsByTagName("tr");

    for (let i = 0; i < rows.length; i++) {

        let row = rows[i];

        let rowDate = row.cells[0].innerText;
        let rowText = row.innerText.toUpperCase();

        let showRow = true;

        // Search Filter
        if (search !== "" && !rowText.includes(search)) {
            showRow = false;
        }

        // Date Filter
        if (fromDate !== "" || toDate !== "") {

            let parts = rowDate.split("-");
            let formattedDate = parts[2] + "-" + parts[1] + "-" + parts[0];

            if (fromDate !== "" && formattedDate < fromDate) {
                showRow = false;
            }

            if (toDate !== "" && formattedDate > toDate) {
                showRow = false;
            }
        }

        row.style.display = showRow ? "" : "none";
    }
    calculateSummary();
};

function getSettings(){

    let s = JSON.parse(localStorage.getItem("shopfloorSettings"));

    if(!s){

        s = [
            50,100,
            60,120,
            100,200,
            80,100,
            35,45,
            80,90,
            500,1000
        ];

    }

    return s;

}

function getIcon(value, warning, danger, reverse=false){

    value = Number(value);

    if(reverse){

        if(value <= danger)
            return "🔴";

        if(value <= warning)
            return "🟡";

        return "🟢";

    }else{

        if(value >= danger)
            return "🔴";

        if(value >= warning)
            return "🟡";

        return "🟢";

    }

}
async function loadHistory() {

    try {

        const response = await fetch("https://smart-shopfloor-dashboard.onrender.com/api/history");

        const data = await response.json();

        const tbody = document.querySelector("#historyTable tbody");

        tbody.innerHTML = "";

        const t = getSettings();
        data.forEach(item => {

        tbody.innerHTML += `
        <tr>
            <td>${item.date}</td>
            <td>${item.time}</td>

            <td>${getIcon(item.pm1, t[0], t[1])} ${Number(item.pm1).toFixed(1)}</td>

            <td>${getIcon(item.pm25, t[2], t[3])} ${Number(item.pm25).toFixed(1)}</td>

            <td>${getIcon(item.pm10, t[4], t[5])} ${Number(item.pm10).toFixed(1)}</td>

            <td>${getIcon(item.noise, t[6], t[7])} ${Number(item.noise).toFixed(1)}</td>

            <td>${getIcon(item.temperature, t[8], t[9])} ${Number(item.temperature).toFixed(1)}</td>

            <td>${getIcon(item.humidity, t[10], t[11])} ${Number(item.humidity).toFixed(1)}</td>

            <td>${getIcon(item.light, t[12], t[13], true)} ${Number(item.light).toFixed(1)}</td>

        </tr>
        `;

        });

        calculateSummary();

    } catch (err) {

        console.log(err);

    }

}
// =============================
// Automatic Statistics
// =============================

function calculateSummary() {

    let table = document.getElementById("historyTable");
    let rows = table.getElementsByTagName("tbody")[0].getElementsByTagName("tr");

    let total = 0;
    let safe = 0;
    let warning = 0;
    let danger = 0;

    for (let i = 0; i < rows.length; i++) {

        if (rows[i].style.display === "none")
            continue;

        total++;

        let status = rows[i].cells[9].innerText.toLowerCase();

        if (status.includes("safe")) {
            safe++;
        }
        else if (status.includes("warning")) {
            warning++;
        }
        else if (status.includes("danger") || status.includes("critical")) {
            danger++;
        }
    }

    document.getElementById("totalRecords").innerHTML = total;
    document.getElementById("safeCount").innerHTML = safe;
    document.getElementById("warningCount").innerHTML = warning;
    document.getElementById("dangerCount").innerHTML = danger;
}
loadHistory();
setInterval(loadHistory,1000);
</script>

</body>

</html>
